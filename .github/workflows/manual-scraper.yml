name: Vinted Manual Scraper

on:
  workflow_dispatch:
    inputs:
      vinted_url:
        description: 'URL del perfil o búsqueda de Vinted'
        required: true
        default: 'https://www.vinted.es/member/123456-usuario'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.MY_WEB_URL }}" ]; then echo "❌ MY_WEB_URL is missing"; exit 1; fi
          if [ -z "${{ secrets.SCRAPER_TOKEN }}" ]; then echo "❌ SCRAPER_TOKEN is missing"; exit 1; fi

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Execute Manual Scrape
        env:
          MY_WEB_URL: ${{ secrets.MY_WEB_URL }}
          SCRAPER_TOKEN: ${{ secrets.SCRAPER_TOKEN }}
        run: node scripts/manual-scrape.js "${{ github.event.inputs.vinted_url }}"
