<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola Financiera - Seychelles Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .drag-over { border: 2px dashed #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; }
        .modo-edicion { border-color: #3b82f6 !important; background-color: rgba(30, 41, 59, 0.9) !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen px-4 bg-gradient-to-b from-slate-900 to-slate-950">
        <div class="bg-slate-800/80 backdrop-blur-md p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700 text-center">
            <h1 class="text-3xl font-black text-white tracking-wider mb-2 uppercase">Seychelles Shop</h1>
            <p class="text-slate-400 text-sm mb-6">Consola de Control Financiero de Artículos</p>
            <div class="flex justify-center mb-4">
                <div id="g_id_onload" data-client_id="463908353578-o70ia5lgf0c7fcce0utp8qqlqnc41iuo.apps.googleusercontent.com" data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_select="false"></div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
            </div>
        </div>
    </div>

    <div id="panel-control" class="hidden max-w-7xl mx-auto px-4 py-6">
        <header class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white uppercase">Consola de Control Financiero</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <p class="text-xs text-emerald-400 font-mono" id="user-display">Autenticado</p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs bg-slate-800 hover:bg-rose-950/40 text-slate-400 hover:text-rose-400 px-4 py-2 rounded-xl border border-slate-700 transition-all uppercase font-semibold tracking-wider">Cerrar Sesión Segura</button>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-blue-600 p-5 rounded-xl shadow-xl border border-blue-500">
                <p class="text-xs font-bold text-blue-100 uppercase tracking-widest">Facturación Bruta</p>
                <p class="text-3xl font-black text-white mt-2" id="kpi-ingresos">0.00 €</p>
            </div>
            <div class="bg-emerald-700 p-5 rounded-xl shadow-xl border border-emerald-600">
                <p class="text-xs font-bold text-emerald-100 uppercase tracking-widest">Margen Neto Teórico</p>
                <p class="text-3xl font-black text-white mt-2" id="kpi-beneficio">0.00 €</p>
            </div>
            <div class="bg-amber-600 p-5 rounded-xl shadow-xl border border-amber-500">
                <p class="text-xs font-bold text-amber-100 uppercase tracking-widest">Inversión Total Realizada</p>
                <p class="text-3xl font-black text-white mt-2" id="kpi-inversion">0.00 €</p>
            </div>
            <div class="bg-zinc-800 p-5 rounded-xl shadow-xl border border-zinc-700">
                <p class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Unidades Vendidas</p>
                <p class="text-3xl font-black text-white mt-2" id="kpi-prendas">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div id="contenedor-formulario" class="bg-slate-800/60 p-5 rounded-xl border border-slate-700 shadow-2xl self-start lg:col-span-1 transition-all">
                <h2 id="titulo-formulario" class="text-md font-bold text-white uppercase tracking-wider mb-4">Añadir Prenda</h2>
                <form id="form-venta" class="space-y-3">
                    <input type="hidden" id="edit-id" value="">
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Nombre / Descripción</label>
                        <input type="text" id="prenda" required placeholder="Ej. Vestido Satinado" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Categoría</label>
                            <select id="categoria" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white focus:outline-none">
                                <option value="Camisetas">👕 Camisetas</option>
                                <option value="Sudaderas">🧥 Sudaderas</option>
                                <option value="Pantalones">👖 Pantalones</option>
                                <option value="Vestidos">👗 Vestidos</option>
                                <option value="Accesorios">👜 Accesorios</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Talla</label>
                            <select id="talla" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white focus:outline-none">
                                <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="Única">Única</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Unidades</label>
                        <input type="number" id="cantidad" required min="1" value="1" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Coste (€)</label>
                            <input type="number" id="precioCompra" required step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Venta (€)</label>
                            <input type="number" id="precioVenta" required step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1">Estado</label>
                        <select id="estado-inicial" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white focus:outline-none">
                            <option value="No Vendido">📦 En Stock (Disponible)</option>
                            <option value="Vendido">💰 Ya Vendido</option>
                        </select>
                    </div>
                    <div class="space-y-2 pt-2">
                        <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-wider py-3 rounded-lg shadow-lg">💾 Registrar Stock</button>
                        <button type="button" id="btn-cancelar" onclick="cancelarEdicion()" class="hidden w-full bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold text-xs uppercase tracking-wider py-2 rounded-lg">Cancelar Edición</button>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700/60 flex flex-col min-h-[500px]">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h3 class="text-sm font-black text-amber-400 uppercase tracking-wider flex items-center gap-2">📦 DISPONIBLES EN STOCK</h3>
                        <span id="badge-stock" class="bg-amber-500/10 text-amber-400 text-xs font-bold px-2.5 py-0.5 rounded-full border border-amber-500/20">0</span>
                    </div>
                    <div id="col-no-vendido" class="space-y-3 flex-1 transition-all p-1 rounded-lg" ondragover="permitirSoltar(event)" ondragleave="quitarMarcaDrop(event)" ondrop="soltarTarjeta(event, 'No Vendido')"></div>
                </div>

                <div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700/60 flex flex-col min-h-[500px]">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700">
                        <h3 class="text-sm font-black text-emerald-400 uppercase tracking-wider flex items-center gap-2">💰 ARTÍCULOS VENDIDOS</h3>
                        <span id="badge-vendido" class="bg-emerald-500/10 text-emerald-400 text-xs font-bold px-2.5 py-0.5 rounded-full border border-emerald-500/20">0</span>
                    </div>
                    <div id="col-vendido" class="space-y-3 flex-1 transition-all p-1 rounded-lg" ondragover="permitirSoltar(event)" ondragleave="quitarMarcaDrop(event)" ondrop="soltarTarjeta(event, 'Vendido')"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = ''; 
        let BASE_DATOS_VENTAS = []; 

        // VERIFICACIÓN PERSISTENTE DE SESIÓN AL CARGAR CON F5
        window.onload = async function() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/auth/verificar`, { credentials: 'include' });
                const data = await res.json();
                if (data.autenticado) {
                    document.getElementById('user-display').innerText = `Conectado: ${data.usuario}`;
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('panel-control').classList.remove('hidden');
                    await cargarVentas();
                }
            } catch (err) { console.error("Error comprobando sesión en F5:", err); }
        };

        async function handleCredentialResponse(response) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    document.getElementById('user-display').innerText = `Conectado: ${data.usuario}`;
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('panel-control').classList.remove('hidden');
                    await cargarVentas();
                } else { alert(data.error || 'No autorizado.'); }
            } catch (err) { alert("Error de comunicación."); }
        }

        async function cargarVentas() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/ventas`, { method: 'GET', credentials: 'include' });
                if (!response.ok) return;
                const data = await response.json();
                if (!data || !data.resumen) return;

                document.getElementById('kpi-ingresos').innerText = `${(data.resumen.ingresos || 0).toFixed(2)} €`;
                document.getElementById('kpi-beneficio').innerText = `${(data.resumen.beneficio || 0).toFixed(2)} €`;
                document.getElementById('kpi-inversion').innerText = `${(data.resumen.inversion || 0).toFixed(2)} €`;
                document.getElementById('kpi-prendas').innerText = data.resumen.prendasVendidas || 0;

                BASE_DATOS_VENTAS = data.ventas || [];
                renderizarTablero();
            } catch (error) { console.error(error); }
        }

        function renderizarTablero() {
            const colNoVendido = document.getElementById('col-no-vendido');
            const colVendido = document.getElementById('col-vendido');
            colNoVendido.innerHTML = '';
            colVendido.innerHTML = '';

            let countStock = 0, countVendido = 0;

            BASE_DATOS_VENTAS.forEach(v => {
                const tarjeta = document.createElement('div');
                tarjeta.id = v._id;
                tarjeta.draggable = true;
                tarjeta.ondragstart = arrastrarTarjeta;
                tarjeta.className = "bg-slate-900 p-4 rounded-xl border border-slate-700/70 shadow-md cursor-grab active:cursor-grabbing hover:border-slate-500 transition-all flex flex-col justify-between gap-3";

                const beneficioTarjeta = (Number(v.precioVenta) - Number(v.precioCompra)) * v.cantidad;

                tarjeta.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-2">
                            <h4 class="font-bold text-white text-sm tracking-wide uppercase">${v.prenda}</h4>
                            <span class="bg-slate-800 text-[10px] font-bold text-slate-300 px-2 py-0.5 rounded">${v.talla}</span>
                        </div>
                        <p class="text-[11px] text-slate-400 font-mono mt-1">${v.categoria} • ${v.cantidad} ud.</p>
                        <p class="text-[10px] text-slate-500 font-mono mt-0.5">Coste: ${Number(v.precioCompra).toFixed(2)}€ | Venta: ${Number(v.precioVenta).toFixed(2)}€</p>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-slate-800/60 mt-1">
                        <div class="text-xs font-mono">
                            <span class="text-slate-500 block text-[9px] uppercase font-bold">Ganancia</span>
                            <span class="${beneficioTarjeta >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-bold">${beneficioTarjeta.toFixed(2)} €</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="activarModoEdicion('${v._id}')" class="text-xs bg-slate-800 text-blue-400 hover:bg-blue-950/50 px-2 py-1 rounded font-bold border border-blue-900/40 transition-all">Editar</button>
                            <button onclick="eliminarRegistro('${v._id}')" class="text-slate-500 hover:text-rose-400 p-1 text-sm">✕</button>
                        </div>
                    </div>
                `;

                if (v.estado === 'Vendido') {
                    colVendido.appendChild(tarjeta);
                    countVendido += v.cantidad;
                } else {
                    colNoVendido.appendChild(tarjeta);
                    countStock += v.cantidad;
                }
            });

            document.getElementById('badge-stock').innerText = `${countStock} uds`;
            document.getElementById('badge-vendido').innerText = `${countVendido} uds`;
        }

        // --- MANIPULACIÓN DEL MODO EDICIÓN ---
        function activarModoEdicion(id) {
            const articulo = BASE_DATOS_VENTAS.find(v => v._id === id);
            if (!articulo) return;

            // Rellenar formulario con los datos recuperados de Atlas
            document.getElementById('edit-id').value = articulo._id;
            document.getElementById('prenda').value = articulo.prenda;
            document.getElementById('categoria').value = articulo.categoria;
            document.getElementById('talla').value = articulo.talla;
            document.getElementById('cantidad').value = articulo.cantidad;
            document.getElementById('precioCompra').value = articulo.precioCompra;
            document.getElementById('precioVenta').value = articulo.precioVenta;
            document.getElementById('estado-inicial').value = articulo.estado;

            // Transición estética visual del contenedor
            document.getElementById('contenedor-formulario').classList.add('modo-edicion');
            document.getElementById('titulo-formulario').innerText = "✏️ Editar Artículo";
            document.getElementById('titulo-formulario').classList.add('text-blue-400');
            document.getElementById('btn-submit').innerText = "🔄 Actualizar Artículo";
            document.getElementById('btn-submit').classList.replace('bg-blue-600', 'bg-blue-500');
            document.getElementById('btn-cancelar').classList.remove('hidden');
            
            // Scroll suave automático al formulario si están en móvil
            document.getElementById('contenedor-formulario').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelarEdicion() {
            document.getElementById('form-venta').reset();
            document.getElementById('edit-id').value = "";
            
            // Restaurar estados visuales normales
            document.getElementById('contenedor-formulario').classList.remove('modo-edicion');
            document.getElementById('titulo-formulario').innerText = "Añadir Prenda";
            document.getElementById('titulo-formulario').classList.remove('text-blue-400');
            document.getElementById('btn-submit').innerText = "💾 Registrar Stock";
            document.getElementById('btn-submit').classList.replace('bg-blue-500', 'bg-blue-600');
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        // --- SUBMIT ÚNICO (CREACIÓN O EDICIÓN) ---
        document.getElementById('form-venta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idParaEditar = document.getElementById('edit-id').value;
            
            const payload = {
                prenda: document.getElementById('prenda').value,
                categoria: document.getElementById('categoria').value,
                talla: document.getElementById('talla').value,
                cantidad: parseInt(document.getElementById('cantidad').value, 10),
                precioCompra: parseFloat(document.getElementById('precioCompra').value),
                precioVenta: parseFloat(document.getElementById('precioVenta').value),
                estado: document.getElementById('estado-inicial').value
            };

            let url = `${BACKEND_URL}/api/ventas`;
            let metodo = 'POST';

            if (idParaEditar) {
                url = `${BACKEND_URL}/api/ventas/${idParaEditar}`;
                metodo = 'PUT';
            }

            try {
                const response = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                if (response.ok) { 
                    cancelarEdicion();
                    await cargarVentas(); 
                } else { alert("Error al procesar la operación."); }
            } catch (error) { alert("Error de red."); }
        });

        // --- DRAG AND DROP NATIVO ---
        function arrastrarTarjeta(e) { e.dataTransfer.setData("text/plain", e.target.id); }
        function permitirSoltar(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function quitarMarcaDrop(e) { e.currentTarget.classList.remove('drag-over'); }

        async function soltarTarjeta(e, nuevoEstado) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const idTarjeta = e.dataTransfer.getData("text/plain");
            if (!idTarjeta) return;

            try {
                const response = await fetch(`${BACKEND_URL}/api/ventas/${idTarjeta}/estado`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ estado: nuevoEstado })
                });
                if (response.ok) await cargarVentas();
            } catch (err) { alert("Error de red al arrastrar."); }
        }

        async function eliminarRegistro(id) {
            if (!confirm('¿Eliminar permanentemente de MongoDB?')) return;
            try {
                const res = await fetch(`${BACKEND_URL}/api/ventas/${id}`, { method: 'DELETE', credentials: 'include' });
                if (res.ok) {
                    if(document.getElementById('edit-id').value === id) cancelarEdicion();
                    await cargarVentas();
                }
            } catch (e) { console.error(e); }
        }

        async function logout() {
            try { await fetch(`${BACKEND_URL}/api/logout`, { credentials: 'include' }); } catch (e) {}
            window.location.reload();
        }
    </script>
</body>
</html>
