<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola Seychelles Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* TEMAS */
        body.theme-dark { background-color: #0f172a; color: #f1f5f9; }
        body.theme-pink { background-color: #fff1f2; color: #831843; }

        .theme-dark .card-bg { background-color: #1e293b; border-color: #334155; }
        .theme-pink .card-bg { background-color: #ffffff; border-color: #fbcfe8; color: #831843; }
        
        .theme-pink .text-main { color: #be185d; }
        .theme-pink .btn-primary { background-color: #db2777; color: white; }
        .theme-pink .btn-primary:hover { background-color: #be185d; }
        
        .drag-over { border: 2px dashed #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; }
        
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
    </style>
</head>
<body id="main-body" class="theme-dark min-h-screen font-sans antialiased pb-20 transition-colors duration-500">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl text-center border border-slate-700">
            <h1 class="text-3xl font-black mb-6 uppercase tracking-widest text-white">Seychelles Shop</h1>
            <div id="g_id_onload" data-client_id="463908353578-o70ia5lgf0c7fcce0utp8qqlqnc41iuo.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue"></div>
        </div>
    </div>

    <div id="panel-control" class="hidden max-w-7xl mx-auto px-4 py-6">
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-700/50 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter" id="title-main">Consola Seychelles</h1>
                <p class="text-xs font-mono opacity-60" id="user-display">Sesión Activa</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex bg-slate-800/50 p-1 rounded-xl border border-slate-700">
                    <button onclick="setTheme('dark')" class="px-3 py-1 text-[10px] font-bold uppercase rounded-lg transition-all" id="btn-theme-dark">Oscuro</button>
                    <button onclick="setTheme('pink')" class="px-3 py-1 text-[10px] font-bold uppercase rounded-lg transition-all" id="btn-theme-pink">Rosa</button>
                </div>
                <button onclick="exportarExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-bold px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg transition-all">
                    📊 EXPORTAR EXCEL
                </button>
                <button onclick="logout()" class="text-[10px] bg-rose-950/20 text-rose-400 border border-rose-900/50 px-4 py-2 rounded-xl font-bold uppercase">Salir</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-blue-600 p-6 rounded-2xl shadow-xl text-white">
                <p class="text-[10px] font-bold uppercase opacity-80">Ingresos Brutos</p>
                <p class="text-3xl font-black mt-1" id="kpi-ingresos">0.00 €</p>
            </div>
            <div class="bg-pink-600 p-6 rounded-2xl shadow-xl text-white">
                <p class="text-[10px] font-bold uppercase opacity-80">Margen Neto</p>
                <p class="text-3xl font-black mt-1" id="kpi-beneficio">0.00 €</p>
            </div>
            <div class="bg-amber-600 p-6 rounded-2xl shadow-xl text-white">
                <p class="text-[10px] font-bold uppercase opacity-80">Inversión Stock</p>
                <p class="text-3xl font-black mt-1" id="kpi-inversion">0.00 €</p>
            </div>
            <div class="bg-slate-700 p-6 rounded-2xl shadow-xl text-white">
                <p class="text-[10px] font-bold uppercase opacity-80">Vendidas</p>
                <p class="text-3xl font-black mt-1" id="kpi-prendas">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div id="form-container" class="card-bg border p-6 rounded-3xl shadow-2xl self-start lg:col-span-1 transition-all">
                <h2 id="form-title" class="text-lg font-black uppercase mb-4">Añadir Prenda</h2>
                <form id="form-venta" class="space-y-4">
                    <input type="hidden" id="edit-id" value="">
                    <div>
                        <label class="block text-[10px] font-bold uppercase opacity-60 mb-1">Nombre Artículo</label>
                        <input type="text" id="prenda" required class="w-full bg-black/10 border border-current/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="categoria" class="bg-black/10 border border-current/20 rounded-xl p-3 text-sm">
                            <option value="Camisetas">👕 Camisetas</option><option value="Sudaderas">🧥 Sudaderas</option><option value="Pantalones">👖 Pantalones</option><option value="Vestidos">👗 Vestidos</option><option value="Accesorios">👜 Accesorios</option>
                        </select>
                        <select id="talla" class="bg-black/10 border border-current/20 rounded-xl p-3 text-sm">
                            <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="Única">Única</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold uppercase opacity-60">Coste (€)</label>
                            <input type="number" id="precioCompra" required step="0.01" class="w-full bg-black/10 border border-current/20 rounded-xl p-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase opacity-60">Venta (€)</label>
                            <input type="number" id="precioVenta" required step="0.01" class="w-full bg-black/10 border border-current/20 rounded-xl p-3 text-sm">
                        </div>
                    </div>
                    <button type="submit" id="btn-submit" class="w-full btn-primary bg-blue-600 text-white font-bold text-xs py-4 rounded-xl shadow-lg uppercase tracking-widest transition-all">Registrar Prenda</button>
                    <button type="button" id="btn-cancel" onclick="cancelEdit()" class="hidden w-full text-[10px] font-bold uppercase opacity-50 py-2">Cancelar</button>
                </form>
            </div>

            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card-bg border rounded-3xl p-5 flex flex-col min-h-[500px]">
                    <h3 class="text-xs font-black text-amber-500 uppercase mb-4 flex justify-between">📦 Stock Disponible <span id="badge-stock" class="opacity-50">0</span></h3>
                    <div id="col-no-vendido" class="flex-1 space-y-3" ondragover="allowDrop(event)" ondrop="drop(event, 'No Vendido')" ondragleave="clearDrop(event)"></div>
                </div>
                <div class="card-bg border rounded-3xl p-5 flex flex-col min-h-[500px]">
                    <h3 class="text-xs font-black text-emerald-500 uppercase mb-4 flex justify-between">💰 Vendido <span id="badge-vendido" class="opacity-50">0</span></h3>
                    <div id="col-vendido" class="flex-1 space-y-3" ondragover="allowDrop(event)" ondrop="drop(event, 'Vendido')" ondragleave="clearDrop(event)"></div>
                </div>
            </div>
        </div>
    </div>

    <footer id="ticker-bar" class="hidden fixed bottom-0 left-0 w-full bg-black h-10 flex items-center z-50 text-[10px] font-mono border-t border-slate-800">
        <div class="bg-rose-600 text-white px-4 h-full flex items-center font-black italic">SEYCHELLES•TICKER</div>
        <div class="ticker-content flex items-center gap-10" id="ticker-content"></div>
    </footer>

    <script>
        const BACKEND_URL = '';
        let BASE_DATOS = [];

        // SISTEMA DE TEMAS
        function setTheme(theme) {
            const body = document.getElementById('main-body');
            const btnDark = document.getElementById('btn-theme-dark');
            const btnPink = document.getElementById('btn-theme-pink');
            
            if (theme === 'pink') {
                body.className = 'theme-pink min-h-screen font-sans antialiased pb-20 transition-colors duration-500';
                btnPink.className = 'px-3 py-1 text-[10px] font-bold uppercase rounded-lg bg-pink-600 text-white shadow-md';
                btnDark.className = 'px-3 py-1 text-[10px] font-bold uppercase rounded-lg opacity-40';
            } else {
                body.className = 'theme-dark min-h-screen font-sans antialiased pb-20 transition-colors duration-500';
                btnDark.className = 'px-3 py-1 text-[10px] font-bold uppercase rounded-lg bg-blue-600 text-white shadow-md';
                btnPink.className = 'px-3 py-1 text-[10px] font-bold uppercase rounded-lg opacity-40';
            }
            localStorage.setItem('seychelles-theme', theme);
        }

        // EXPORTAR A EXCEL
        function exportarExcel() {
            if (BASE_DATOS.length === 0) return alert("No hay datos para exportar.");
            
            const dataFormateada = BASE_DATOS.map(v => ({
                Fecha: v.fecha,
                Artículo: v.prenda,
                Categoría: v.categoria,
                Talla: v.talla,
                Cantidad: v.cantidad,
                'Coste Unidad (€)': v.precioCompra.toFixed(2),
                'Venta Unidad (€)': v.precioVenta.toFixed(2),
                Estado: v.estado,
                'Total Inversión (€)': (v.precioCompra * v.cantidad).toFixed(2),
                'Total Venta (€)': (v.precioVenta * v.cantidad).toFixed(2),
                'Beneficio Neto (€)': ((v.precioVenta - v.precioCompra) * v.cantidad).toFixed(2)
            }));

            const ws = XLSX.utils.json_to_sheet(dataFormateada);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario Seychelles");
            
            const fecha = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Seychelles_Reporte_${fecha}.xlsx`);
        }

        // LOGICA DE DATOS
        window.onload = async () => {
            const savedTheme = localStorage.getItem('seychelles-theme') || 'dark';
            setTheme(savedTheme);
            
            const res = await fetch(`${BACKEND_URL}/api/auth/verificar`, { credentials: 'include' });
            const data = await res.json();
            if (data.autenticado) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('panel-control').classList.remove('hidden');
                document.getElementById('ticker-bar').classList.remove('hidden');
                document.getElementById('user-display').innerText = `👤 ${data.usuario}`;
                await loadData();
            }
        };

        async function handleCredentialResponse(response) {
            const res = await fetch(`${BACKEND_URL}/api/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ token: response.credential })
            });
            if (res.ok) window.location.reload();
        }

        async function loadData() {
            const res = await fetch(`${BACKEND_URL}/api/ventas`, { credentials: 'include' });
            const data = await res.json();
            BASE_DATOS = data.ventas;
            
            document.getElementById('kpi-ingresos').innerText = `${data.resumen.ingresos.toFixed(2)} €`;
            document.getElementById('kpi-beneficio').innerText = `${data.resumen.beneficio.toFixed(2)} €`;
            document.getElementById('kpi-inversion').innerText = `${data.resumen.inversion.toFixed(2)} €`;
            document.getElementById('kpi-prendas').innerText = data.resumen.prendasVendidas;
            
            renderBoard();
            updateTicker();
        }

        function renderBoard() {
            const colStock = document.getElementById('col-no-vendido');
            const colVendido = document.getElementById('col-vendido');
            colStock.innerHTML = ''; colVendido.innerHTML = '';
            
            let sCount = 0, vCount = 0;

            BASE_DATOS.forEach(v => {
                const card = document.createElement('div');
                card.id = v._id;
                card.draggable = true;
                card.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
                card.className = "card-bg border p-4 rounded-2xl shadow-sm cursor-grab active:cursor-grabbing hover:scale-[1.02] transition-transform";
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h4 class="font-black text-xs uppercase">${v.prenda}</h4>
                        <span class="text-[9px] font-bold bg-black/5 px-2 py-0.5 rounded">${v.talla}</span>
                    </div>
                    <div class="flex justify-between items-end mt-4">
                        <span class="text-[10px] font-mono opacity-50">${v.categoria}</span>
                        <div class="flex gap-2">
                            <button onclick="editItem('${v._id}')" class="text-[9px] font-bold text-blue-500 uppercase">Editar</button>
                            <button onclick="deleteItem('${v._id}')" class="text-[9px] font-bold text-rose-500 uppercase">✕</button>
                        </div>
                    </div>
                `;

                if (v.estado === 'Vendido') { colVendido.appendChild(card); vCount += v.cantidad; }
                else { colStock.appendChild(card); sCount += v.cantidad; }
            });
            document.getElementById('badge-stock').innerText = sCount;
            document.getElementById('badge-vendido').innerText = vCount;
        }

        function updateTicker() {
            const ticker = document.getElementById('ticker-content');
            let content = '';
            BASE_DATOS.slice(0, 10).forEach(v => {
                const icon = v.estado === 'Vendido' ? '🟢' : '🟡';
                content += `<span>${icon} ${v.prenda.toUpperCase()} - ${v.precioVenta.toFixed(2)}€ [${v.estado}]</span>`;
            });
            ticker.innerHTML = content + content;
        }

        // DRAG AND DROP
        const allowDrop = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
        const clearDrop = (e) => e.currentTarget.classList.remove('drag-over');
        async function drop(e, newState) {
            e.preventDefault();
            clearDrop(e);
            const id = e.dataTransfer.getData("text");
            await fetch(`${BACKEND_URL}/api/ventas/${id}/estado`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ estado: newState })
            });
            await loadData();
        }

        // FORMULARIO
        document.getElementById('form-venta').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const payload = {
                prenda: document.getElementById('prenda').value,
                categoria: document.getElementById('categoria').value,
                talla: document.getElementById('talla').value,
                cantidad: parseInt(document.getElementById('cantidad').value),
                precioCompra: parseFloat(document.getElementById('precioCompra').value),
                precioVenta: parseFloat(document.getElementById('precioVenta').value)
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${BACKEND_URL}/api/ventas/${id}` : `${BACKEND_URL}/api/ventas`;
            
            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(payload)
            });
            cancelEdit();
            await loadData();
        };

        function editItem(id) {
            const item = BASE_DATOS.find(v => v._id === id);
            document.getElementById('edit-id').value = item._id;
            document.getElementById('prenda').value = item.prenda;
            document.getElementById('precioCompra').value = item.precioCompra;
            document.getElementById('precioVenta').value = item.precioVenta;
            document.getElementById('form-title').innerText = "Editar Artículo";
            document.getElementById('btn-submit').innerText = "Guardar Cambios";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('form-venta').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "Añadir Prenda";
            document.getElementById('btn-submit').innerText = "Registrar Prenda";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function deleteItem(id) {
            if (confirm("¿Eliminar para siempre?")) {
                await fetch(`${BACKEND_URL}/api/ventas/${id}`, { method: 'DELETE', credentials: 'include' });
                await loadData();
            }
        }

        async function logout() { await fetch(`${BACKEND_URL}/api/logout`, { credentials: 'include' }); window.location.reload(); }
    </script>
</body>
</html>
